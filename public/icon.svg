<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pixel kitty face in the Nier warm palette -->
  <!-- Ears -->
  <rect x="4" y="2" width="4" height="4" fill="#c8bfa8"/>
  <rect x="24" y="2" width="4" height="4" fill="#c8bfa8"/>
  <rect x="6" y="4" width="4" height="4" fill="#c8bfa8"/>
  <rect x="22" y="4" width="4" height="4" fill="#c8bfa8"/>
  <!-- Inner ears -->
  <rect x="6" y="4" width="2" height="2" fill="#7a7468"/>
  <rect x="24" y="4" width="2" height="2" fill="#7a7468"/>
  <!-- Head -->
  <rect x="6" y="8" width="20" height="4" fill="#c8bfa8"/>
  <rect x="4" y="12" width="24" height="4" fill="#c8bfa8"/>
  <rect x="4" y="16" width="24" height="4" fill="#c8bfa8"/>
  <rect x="6" y="20" width="20" height="4" fill="#c8bfa8"/>
  <rect x="8" y="24" width="16" height="2" fill="#c8bfa8"/>
  <!-- Eyes -->
  <rect x="10" y="14" width="2" height="4" fill="#1a1a18"/>
  <rect x="20" y="14" width="2" height="4" fill="#1a1a18"/>
  <!-- Eye shine -->
  <rect x="10" y="14" width="2" height="2" fill="#3a3830"/>
  <rect x="20" y="14" width="2" height="2" fill="#3a3830"/>
  <!-- Nose -->
  <rect x="15" y="18" width="2" height="2" fill="#7a7468"/>
  <!-- Mouth -->
  <rect x="13" y="20" width="2" height="2" fill="#7a7468"/>
  <rect x="17" y="20" width="2" height="2" fill="#7a7468"/>
  <!-- Whisker dots -->
  <rect x="6" y="18" width="2" height="2" fill="#7a7468"/>
  <rect x="24" y="18" width="2" height="2" fill="#7a7468"/>
</svg>
