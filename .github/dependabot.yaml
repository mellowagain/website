version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      all:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: 
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      all:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
